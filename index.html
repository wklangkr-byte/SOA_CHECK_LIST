<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Makro SOA Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --red:#E63946;--red-dark:#c1121f;--red-light:#fde8ea;
  --navy:#1d3557;--navy-mid:#457b9d;--navy-light:#a8dadc;
  --bg:#f8f9fc;--surface:#ffffff;--surface2:#f1f3f8;
  --border:#e2e6ef;--text:#1a2035;--text2:#5a6478;--text3:#9aa3b5;
  --shadow:0 2px 12px rgba(0,0,0,0.08);--shadow2:0 4px 24px rgba(0,0,0,0.12);
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --topbar-h:60px;--sidebar-w:270px;
}

/* ===== BASE ===== */
html,body{height:100%;overflow:hidden}
body{font-family:"Sarabun",sans-serif;background:var(--bg);color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased}

/* ===== LOGIN ===== */
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1d3557 0%,#457b9d 55%,#a8dadc 100%);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px}
.login-box{background:rgba(255,255,255,0.97);border-radius:20px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .logo-m{width:56px;height:56px;background:var(--red);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:26px;font-weight:700;color:white}
.login-logo h1{font-size:19px;font-weight:700;color:var(--navy);margin-bottom:3px}
.login-logo p{font-size:13px;color:var(--text2)}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:5px}
.login-field input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:16px;font-family:inherit;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
.login-field input:focus{border-color:var(--navy-mid)}
.login-btn{width:100%;padding:13px;background:var(--red);color:white;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:6px;transition:background 0.2s;-webkit-appearance:none;touch-action:manipulation}
.login-btn:hover{background:var(--red-dark)}
.login-btn:active{background:var(--red-dark);transform:scale(0.99)}
.login-error{background:#fde8ea;color:var(--red-dark);border:1px solid #f5c2c7;border-radius:var(--radius-xs);padding:10px 14px;font-size:13px;margin-top:10px;display:none}

/* ===== APP SHELL ===== */
#app{display:none;height:100vh;flex-direction:column}
#app.visible{display:flex}

/* ===== TOPBAR ===== */
.topbar{background:var(--navy);color:white;padding:0 16px;height:var(--topbar-h);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--shadow2);position:relative;z-index:200}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{width:38px;height:38px;background:var(--red);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;line-height:1.2}
.topbar-subtitle{font-size:11px;opacity:0.6;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.user-badge{background:rgba(255,255,255,0.15);border-radius:20px;padding:5px 12px;font-size:12px;display:flex;align-items:center;gap:6px}
.user-role{background:var(--red);border-radius:10px;padding:2px 7px;font-size:10px;font-weight:700}
.logout-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;border-radius:var(--radius-xs);padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;touch-action:manipulation}
.logout-btn:active{background:rgba(255,255,255,0.25)}

/* hamburger for mobile */
.hamburger{display:none;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:var(--radius-xs);width:36px;height:36px;align-items:center;justify-content:center;cursor:pointer;flex-direction:column;gap:4px;flex-shrink:0;padding:8px;touch-action:manipulation}
.hamburger span{display:block;width:18px;height:2px;background:white;border-radius:1px;transition:all 0.25s}
.hamburger.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}

/* ===== LAYOUT ===== */
.main-content{display:flex;flex:1;overflow:hidden;position:relative}

/* ===== SIDEBAR ===== */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;transition:transform 0.3s ease,width 0.3s ease;flex-shrink:0;position:relative;z-index:100}
.sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-header-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.sidebar-collapse-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--text2);transition:all 0.2s;touch-action:manipulation;flex-shrink:0}
.sidebar-collapse-btn:hover{background:var(--border)}

.group-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 16px;background:none;border:none;text-align:left;cursor:pointer;font-family:inherit;font-size:13px;color:var(--text2);transition:all 0.15s;border-left:3px solid transparent;touch-action:manipulation;min-height:44px}
.group-btn:hover{background:var(--surface2);color:var(--text)}
.group-btn:active{background:var(--surface2)}
.group-btn.active{background:var(--red-light);color:var(--red-dark);border-left-color:var(--red);font-weight:600}
.group-icon-wrap{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.group-label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.group-count{flex-shrink:0;background:var(--surface2);border-radius:10px;padding:2px 7px;font-size:11px;font-weight:600;color:var(--text3)}
.group-btn.active .group-count{background:rgba(230,57,70,0.15);color:var(--red-dark)}

/* ===== SIDEBAR COLLAPSED (desktop) ===== */
.sidebar.collapsed{width:56px;min-width:56px}
.sidebar.collapsed .sidebar-header-title{display:none}
.sidebar.collapsed .group-label{display:none}
.sidebar.collapsed .group-count{display:none}
.sidebar.collapsed .group-btn{padding:9px;justify-content:center;gap:0}
.sidebar.collapsed .sidebar-header{justify-content:center;padding:14px 8px 8px}

/* ===== OVERLAY (mobile) ===== */
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:150;touch-action:manipulation}

/* ===== CONTENT ===== */
.content-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px;-webkit-overflow-scrolling:touch;min-width:0}

/* ===== SEARCH ===== */
.search-bar-wrap{margin-bottom:16px}
.search-bar{display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 16px;transition:border-color 0.2s}
.search-bar:focus-within{border-color:var(--navy-mid);box-shadow:0 0 0 3px rgba(69,123,157,0.1)}
.search-bar input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;color:var(--text);background:transparent;min-width:0}
.search-bar input::placeholder{color:var(--text3)}
.search-clear{background:var(--surface2);border:none;border-radius:50%;width:26px;height:26px;min-width:26px;cursor:pointer;font-size:12px;color:var(--text3);display:none;align-items:center;justify-content:center;touch-action:manipulation}

/* ===== STATS ===== */
.stats-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;flex:1;text-align:center;min-width:80px}
.stat-card .num{font-size:22px;font-weight:700;color:var(--navy)}
.stat-card .lbl{font-size:11px;color:var(--text3);margin-top:2px}

/* ===== GROUP HEADER ===== */
.group-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.group-header-icon{width:42px;height:42px;min-width:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--red-light)}
.group-header-info h2{font-size:17px;font-weight:700;color:var(--navy)}
.group-header-info p{font-size:12px;color:var(--text2);margin-top:2px}

/* ===== CHECK CARDS ===== */
.checklist-grid{display:flex;flex-direction:column;gap:10px}
.check-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:box-shadow 0.2s,border-color 0.2s;cursor:pointer;touch-action:manipulation}
.check-card:active{background:var(--surface2)}
.check-card.expanded{border-color:var(--navy);box-shadow:var(--shadow2)}
.card-header{padding:13px 16px;display:flex;align-items:flex-start;gap:10px;min-height:52px}
.card-no{width:30px;height:30px;min-width:30px;background:var(--navy);color:white;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.card-title-wrap{flex:1;min-width:0}
.card-title{font-size:14px;line-height:1.5;color:var(--text);font-weight:500}
.freq-badge{display:inline-block;background:#e8f8f0;color:#157347;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600;white-space:nowrap;margin-top:4px}
.card-expand-icon{color:var(--text3);font-size:14px;flex-shrink:0;margin-top:8px;transition:transform 0.25s;line-height:1}
.check-card.expanded .card-expand-icon{transform:rotate(180deg)}
.card-body{padding:0 16px 14px;display:none;border-top:1px solid var(--border)}
.check-card.expanded .card-body{display:block;padding-top:12px}
.detail-section{margin-bottom:10px}
.detail-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.detail-label .dot{width:5px;height:5px;border-radius:50%;background:var(--red);display:inline-block;flex-shrink:0}
.detail-text{font-size:13.5px;color:var(--text);line-height:1.7;white-space:pre-wrap;background:var(--surface2);border-radius:var(--radius-sm);padding:9px 12px}
.photo-guide{font-size:13px;color:var(--navy-mid);background:#e8f4fd;border-radius:var(--radius-sm);padding:8px 12px;display:flex;gap:8px;align-items:flex-start}

/* ===== ADMIN ===== */
#admin-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;border-top:3px solid #7209b7}
.admin-panel-title{font-size:13px;font-weight:700;color:#7209b7;margin-bottom:10px}
.admin-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.admin-stat{background:var(--surface2);border-radius:var(--radius-sm);padding:10px;text-align:center}
.admin-stat .n{font-size:20px;font-weight:700;color:var(--navy)}
.admin-stat .l{font-size:10px;color:var(--text3);margin-top:2px}

/* ===== ALL GROUPS ===== */
.all-groups{display:flex;flex-direction:column;gap:16px}
.group-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.group-section-header{padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.group-section-header h3{font-size:14px;font-weight:700;color:var(--navy);flex:1}
.group-items{padding:8px}
.group-item-row{padding:9px 10px;border-radius:var(--radius-sm);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background 0.15s;touch-action:manipulation;min-height:44px}
.group-item-row:active{background:var(--surface2)}
.group-item-row:hover{background:var(--surface2)}
.item-no{width:26px;height:26px;min-width:26px;background:var(--navy);color:white;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.item-text{font-size:13px;color:var(--text);line-height:1.4;flex:1;min-width:0}

/* ===== SEARCH RESULTS ===== */
.search-result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:all 0.2s;margin-bottom:10px;touch-action:manipulation}
.search-result-card:active{background:var(--surface2)}
.sr-meta{display:flex;align-items:center;gap:7px;margin-bottom:7px;flex-wrap:wrap}
.sr-group-tag{background:var(--red-light);color:var(--red-dark);border-radius:20px;padding:3px 9px;font-size:11px;font-weight:600}
.sr-no{background:var(--navy);color:white;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700}
.sr-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.5;margin-bottom:5px}
.sr-method{font-size:12.5px;color:var(--text2);line-height:1.5}
mark{background:#fff3cd;color:#856404;border-radius:2px;padding:0 2px}

.empty-state{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-text{font-size:14px;font-weight:500;color:var(--text2)}
.empty-sub{font-size:12px;margin-top:5px}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.2s ease}

/* ===== TABLET ===== */
@media (max-width:900px){
  :root{--sidebar-w:240px}
  .topbar-subtitle{display:none}
  .user-badge .user-name-text{display:none}
  .admin-stats{grid-template-columns:repeat(2,1fr)}
}

/* ===== MOBILE ===== */
@media (max-width:640px){
  :root{--topbar-h:56px}
  .hamburger{display:flex}
  .sidebar{
    position:fixed;
    top:var(--topbar-h);
    left:0;
    height:calc(100vh - var(--topbar-h));
    width:var(--sidebar-w) !important;
    min-width:var(--sidebar-w) !important;
    transform:translateX(-110%);
    transition:transform 0.3s ease;
    z-index:160;
    box-shadow:var(--shadow2);
  }
  .sidebar.open{transform:translateX(0)}
  .sidebar.collapsed{width:var(--sidebar-w) !important;min-width:var(--sidebar-w) !important}
  .sidebar.collapsed .group-label{display:block !important}
  .sidebar.collapsed .group-count{display:block !important}
  .sidebar.collapsed .sidebar-header-title{display:block !important}
  .sidebar.collapsed .group-btn{padding:9px 16px !important;justify-content:flex-start !important;gap:9px !important}
  .sidebar.collapsed .sidebar-header{justify-content:space-between !important;padding:14px 16px 8px !important}
  .sidebar-collapse-btn{display:none}
  #sidebar-overlay.visible{display:block}
  .content-area{padding:14px}
  .topbar{padding:0 12px}
  .topbar-logo{width:34px;height:34px;font-size:15px}
  .topbar-title{font-size:14px}
  .user-role{display:none}
  .stats-row{gap:8px}
  .stat-card{min-width:0;padding:8px 10px}
  .stat-card .num{font-size:18px}
  .admin-stats{grid-template-columns:repeat(2,1fr)}
  .login-box{padding:32px 24px}
  .card-title{font-size:13.5px}
  .detail-text{font-size:13px}
}

/* ===== VERY SMALL ===== */
@media (max-width:360px){
  :root{--sidebar-w:100vw}
  .content-area{padding:10px}
  .group-header-icon{width:36px;height:36px;min-width:36px}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-m">M</div>
      <h1>Store Operations Audit</h1>
      <p>Makro SOA Checklist System</p>
    </div>
    <div class="login-field">
      <label>Username</label>
      <input type="text" id="username" placeholder="กรอก Username" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="password" placeholder="กรอก Password" autocomplete="current-password">
    </div>
    <button class="login-btn" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div class="login-error" id="login-error">Username หรือ Password ไม่ถูกต้อง</div>
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid #eee;font-size:11px;color:#bbb;text-align:center">SOA System v2.2 &middot; Makro Thailand</div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger" id="hamburger-btn" onclick="toggleMobileSidebar()" aria-label="เมนู">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-logo">M</div>
      <div>
        <div class="topbar-title">Store Operations Audit</div>
        <div class="topbar-subtitle">Makro SOA Checklist</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="user-badge">
        <span id="user-display" class="user-name-text">-</span>
        <span class="user-role" id="role-display">-</span>
      </div>
      <button class="logout-btn" onclick="doLogout()">ออก</button>
    </div>
  </div>
  <div class="main-content">
    <div id="sidebar-overlay" onclick="closeMobileSidebar()"></div>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-header-title">หมวดหมู่</span>
        <button class="sidebar-collapse-btn" id="collapse-btn" onclick="toggleSidebar()" title="ย่อ/ขยายเมนู">&#9664;</button>
      </div>
      <button class="group-btn active" onclick="showAll();closeMobileSidebar()" id="btn-all">
        <div class="group-icon-wrap" style="background:#e8eaf6">&#128203;</div>
        <span class="group-label">ทั้งหมด</span>
        <span class="group-count" id="cnt-all">163</span>
      </button>
      <div id="group-list"></div>
    </div>
    <div class="content-area" id="content-area"></div>
  </div>

<script>

/* ====== LOGIN ====== */
function doLogin() {
  var u = document.getElementById("username").value.trim().toLowerCase();
  var p = document.getElementById("password").value;
  if (USERS[u] && USERS[u].pass === p) {
    currentUser = { username: u, role: USERS[u].role, display: USERS[u].display };
    document.getElementById("login-error").style.display = "none";
    document.getElementById("login-screen").style.display = "none";
    var appEl = document.getElementById("app");
    appEl.style.display = "flex";
    appEl.classList.add("visible");
    document.getElementById("user-display").textContent = currentUser.display;
    document.getElementById("role-display").textContent = currentUser.role;
    initApp();
  } else {
    document.getElementById("login-error").style.display = "block";
    document.getElementById("password").value = "";
  }
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    var ls = document.getElementById("login-screen");
    if (ls && ls.style.display !== "none") doLogin();
  }
});

function doLogout() {
  currentUser = null;
  closeMobileSidebar();
  var appEl = document.getElementById("app");
  appEl.style.display = "none";
  appEl.classList.remove("visible");
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("username").value = "";
  document.getElementById("password").value = "";
  document.getElementById("login-error").style.display = "none";
}

function initApp() {
  buildSidebar();
  showAll();
}

/* ====== SIDEBAR CONTROLS ====== */
function toggleSidebar() {
  var sb = document.getElementById("sidebar");
  var btn = document.getElementById("collapse-btn");
  sidebarCollapsed = !sidebarCollapsed;
  if (sidebarCollapsed) {
    sb.classList.add("collapsed");
    btn.innerHTML = "&#9654;";
    btn.title = "ขยายเมนู";
  } else {
    sb.classList.remove("collapsed");
    btn.innerHTML = "&#9664;";
    btn.title = "ย่อเมนู";
  }
}

function toggleMobileSidebar() {
  if (mobileSidebarOpen) closeMobileSidebar();
  else openMobileSidebar();
}

function openMobileSidebar() {
  mobileSidebarOpen = true;
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("sidebar-overlay").classList.add("visible");
  document.getElementById("hamburger-btn").classList.add("open");
}

function closeMobileSidebar() {
  mobileSidebarOpen = false;
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebar-overlay").classList.remove("visible");
  document.getElementById("hamburger-btn").classList.remove("open");
}

/* ====== DATA HELPERS ====== */
function getGroups() {
  var seen = {}, groups = [];
  for (var i = 0; i < DATA.length; i++) {
    var g = DATA[i].group;
    if (g && !seen[g]) { seen[g] = true; groups.push(g); }
  }
  return groups;
}

function buildSidebar() {
  var groups = getGroups();
  var gl = document.getElementById("group-list");
  gl.innerHTML = "";
  for (var i = 0; i < groups.length; i++) {
    (function(g, idx) {
      var count = 0;
      for (var k = 0; k < DATA.length; k++) if (DATA[k].group === g) count++;
      var icon = GROUP_ICONS[g] || "\uD83D\uDCCC";
      var btn = document.createElement("button");
      btn.className = "group-btn";
      btn.id = "btn-g-" + idx;
      btn.title = g;
      btn.innerHTML =
        '<div class="group-icon-wrap" style="background:var(--surface2)">' + icon + '</div>' +
        '<span class="group-label">' + escHtml(g) + '</span>' +
        '<span class="group-count">' + count + '</span>';
      btn.onclick = function() { showGroup(g, idx); closeMobileSidebar(); };
      gl.appendChild(btn);
    })(groups[i], i);
  }
}

function setActiveBtn(id) {
  var btns = document.querySelectorAll(".group-btn");
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove("active");
  var el = document.getElementById(id);
  if (el) { el.classList.add("active"); el.scrollIntoView({ block: "nearest", behavior: "smooth" }); }
}

/* ====== VIEWS ====== */
function showAll() {
  currentGroup = "all";
  setActiveBtn("btn-all");
  var ca = document.getElementById("content-area");
  ca.scrollTop = 0;
  var groups = getGroups();
  var html = "";

  if (currentUser && currentUser.role === "Admin") {
    var withFreq = 0, withPhoto = 0;
    for (var i = 0; i < DATA.length; i++) {
      if (DATA[i].frequency && DATA[i].frequency !== "") withFreq++;
      if (DATA[i].pictures && DATA[i].pictures !== "") withPhoto++;
    }
    html += '<div id="admin-panel"><div class="admin-panel-title">&#9889; Admin Dashboard</div>';
    html += '<div class="admin-stats">';
    html += '<div class="admin-stat"><div class="n">' + DATA.length + '</div><div class="l">รายการทั้งหมด</div></div>';
    html += '<div class="admin-stat"><div class="n">' + groups.length + '</div><div class="l">หมวดหมู่</div></div>';
    html += '<div class="admin-stat"><div class="n">' + withFreq + '</div><div class="l">มีความถี่ตรวจ</div></div>';
    html += '<div class="admin-stat"><div class="n">' + withPhoto + '</div><div class="l">มีคำแนะนำรูป</div></div>';
    html += '</div></div>';
  }

  html += renderSearchBar();

  var daily = 0;
  for (var i = 0; i < DATA.length; i++) if (DATA[i].frequency && DATA[i].frequency.indexOf("\u0e40\u0e0a\u0e49\u0e32") >= 0) daily++;
  html += '<div class="stats-row">';
  html += '<div class="stat-card"><div class="num">' + DATA.length + '</div><div class="lbl">รายการทั้งหมด</div></div>';
  html += '<div class="stat-card"><div class="num">' + groups.length + '</div><div class="lbl">หมวดหมู่</div></div>';
  html += '<div class="stat-card"><div class="num">' + daily + '</div><div class="lbl">ตรวจ 2 รอบ/วัน</div></div>';
  html += '</div>';

  html += '<div class="all-groups fade-in">';
  for (var i = 0; i < groups.length; i++) {
    var g = groups[i];
    var items = [];
    for (var k = 0; k < DATA.length; k++) if (DATA[k].group === g) items.push(DATA[k]);
    var icon = GROUP_ICONS[g] || "\uD83D\uDCCC";
    html += '<div class="group-section">';
    html += '<div class="group-section-header"><span style="font-size:18px">' + icon + '</span><h3>' + escHtml(g) + '</h3><span class="group-count">' + items.length + ' รายการ</span></div>';
    html += '<div class="group-items">';
    for (var j = 0; j < items.length; j++) {
      html += '<div class="group-item-row" data-no="' + items[j].no + '"><div class="item-no">' + items[j].no + '</div><div class="item-text">' + escHtml(items[j].checklist) + '</div><span style="color:var(--text3);font-size:16px">&rsaquo;</span></div>';
    }
    html += '</div></div>';
  }
  html += '</div>';
  ca.innerHTML = html;
  setupSearch();
  ca.querySelectorAll(".group-item-row").forEach(function(el) {
    el.addEventListener("click", function() { openItem(this.dataset.no); });
  });
}

function showGroup(groupName, idx) {
  currentGroup = groupName;
  setActiveBtn("btn-g-" + idx);
  var items = [];
  for (var i = 0; i < DATA.length; i++) if (DATA[i].group === groupName) items.push(DATA[i]);
  var icon = GROUP_ICONS[groupName] || "\uD83D\uDCCC";
  var ca = document.getElementById("content-area");
  ca.scrollTop = 0;
  var html = renderSearchBar();
  html += '<div class="group-header fade-in"><div class="group-header-icon">' + icon + '</div><div class="group-header-info"><h2>' + escHtml(groupName) + '</h2><p>' + items.length + ' รายการตรวจสอบ</p></div></div>';
  html += '<div class="checklist-grid fade-in">';
  for (var i = 0; i < items.length; i++) html += renderCheckCard(items[i], "");
  html += '</div>';
  ca.innerHTML = html;
  setupSearch();
  ca.querySelectorAll(".check-card").forEach(function(card) {
    card.addEventListener("click", function(e) { toggleCard(this); });
  });
}

function renderCheckCard(item, hl) {
  var freq = item.frequency && item.frequency !== "" ? item.frequency : "";
  var freqBadge = freq ? '<div class="freq-badge">' + escHtml(freq.substring(0,24)) + (freq.length > 24 ? "..." : "") + '</div>' : "";
  var title = hl ? highlightText(escHtml(item.checklist), hl) : escHtml(item.checklist);
  var body = "";
  if (item.method && item.method !== "") {
    body += '<div class="detail-section"><div class="detail-label"><span class="dot"></span>วิธีการตรวจสอบ</div><div class="detail-text">' + escHtml(item.method) + '</div></div>';
  }
  if (item.pictures && item.pictures !== "") {
    body += '<div class="detail-section"><div class="photo-guide"><span style="font-size:15px;flex-shrink:0">&#128247;</span><span>' + escHtml(item.pictures) + '</span></div></div>';
  }
  if (!item.method && !item.pictures) body += '<div class="detail-text" style="color:var(--text3)">ไม่มีรายละเอียดเพิ่มเติม</div>';
  return '<div class="check-card" id="card-' + item.no + '">' +
    '<div class="card-header"><div class="card-no">' + item.no + '</div>' +
    '<div class="card-title-wrap"><div class="card-title">' + title + '</div>' + freqBadge + '</div>' +
    '<span class="card-expand-icon">&#9660;</span></div>' +
    '<div class="card-body">' + body + '</div></div>';
}

function toggleCard(el) { el.classList.toggle("expanded"); }

function openItem(no) {
  var item = null;
  for (var i = 0; i < DATA.length; i++) if (DATA[i].no === no) { item = DATA[i]; break; }
  if (!item) return;
  var groups = getGroups();
  var idx = groups.indexOf(item.group);
  showGroup(item.group, idx);
  setTimeout(function() {
    var card = document.getElementById("card-" + no);
    if (card) { card.classList.add("expanded"); card.scrollIntoView({ behavior: "smooth", block: "center" }); }
  }, 120);
}

/* ====== SEARCH ====== */
function renderSearchBar() {
  return '<div class="search-bar-wrap"><div class="search-bar"><span style="color:var(--text3);font-size:17px;flex-shrink:0">&#128269;</span><input type="search" id="search-input" placeholder="\u0e04\u0e49\u0e19\u0e2b\u0e32\u0e2b\u0e31\u0e27\u0e02\u0e49\u0e2d\u0e15\u0e23\u0e27\u0e08\u0e2a\u0e2d\u0e1a..." oninput="onSearch(this.value)" autocomplete="off" autocorrect="off" spellcheck="false"><button class="search-clear" id="search-clear" onclick="clearSearch()">&#10005;</button></div></div>';
}

function setupSearch() {}

function escHtml(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function highlightText(text, q) {
  if (!q) return text;
  var escaped = q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  return text.replace(new RegExp(escaped, "gi"), function(m) { return "<mark>" + m + "</mark>"; });
}

function onSearch(val) {
  var clr = document.getElementById("search-clear");
  if (clr) clr.style.display = val ? "flex" : "none";
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(function() { doSearch(val); }, 220);
}

function doSearch(val) {
  var q = val.trim().toLowerCase();
  var ca = document.getElementById("content-area");
  if (!q) {
    if (currentGroup === "all") showAll();
    else { var groups = getGroups(); showGroup(currentGroup, groups.indexOf(currentGroup)); }
    return;
  }
  var pool = currentGroup === "all" ? DATA : DATA.filter(function(d) { return d.group === currentGroup; });
  var results = [];
  for (var i = 0; i < pool.length; i++) {
    var d = pool[i];
    if (d.checklist.toLowerCase().indexOf(q) >= 0 || d.method.toLowerCase().indexOf(q) >= 0 ||
        d.group.toLowerCase().indexOf(q) >= 0 || d.no.indexOf(q) >= 0) results.push(d);
  }
  var uniqueGroups = {};
  for (var i = 0; i < results.length; i++) uniqueGroups[results[i].group] = 1;
  var html = renderSearchBar();
  html += '<div class="stats-row">';
  html += '<div class="stat-card"><div class="num">' + results.length + '</div><div class="lbl">ผลการค้นหา</div></div>';
  html += '<div class="stat-card"><div class="num">' + Object.keys(uniqueGroups).length + '</div><div class="lbl">หมวดหมู่</div></div>';
  html += '</div>';
  if (results.length === 0) {
    html += '<div class="empty-state"><div class="empty-icon">&#128269;</div><div class="empty-text">ไม่พบรายการที่ค้นหา</div><div class="empty-sub">ลองค้นด้วยคำอื่น หรือเลือกหมวดหมู่จากเมนูซ้าย</div></div>';
  } else {
    html += '<div class="fade-in">';
    for (var i = 0; i < results.length; i++) {
      var item = results[i];
      var icon = GROUP_ICONS[item.group] || "\uD83D\uDCCC";
      html += '<div class="search-result-card" data-no="' + item.no + '">';
      html += '<div class="sr-meta"><span class="sr-no">#' + item.no + '</span><span class="sr-group-tag">' + icon + ' ' + escHtml(item.group) + '</span></div>';
      html += '<div class="sr-title">' + highlightText(escHtml(item.checklist), val) + '</div>';
      if (item.method) html += '<div class="sr-method">' + highlightText(escHtml(item.method.substring(0, 130)), val) + (item.method.length > 130 ? "..." : "") + '</div>';
      html += '</div>';
    }
    html += '</div>';
  }
  ca.innerHTML = html;
  var inp = document.getElementById("search-input");
  if (inp) { inp.value = val; inp.focus(); try { inp.setSelectionRange(val.length, val.length); } catch(e){} }
  var clr = document.getElementById("search-clear");
  if (clr) clr.style.display = val ? "flex" : "none";
  ca.querySelectorAll(".search-result-card").forEach(function(el) {
    el.addEventListener("click", function() { openItem(this.dataset.no); });
  });
}

function clearSearch() {
  var inp = document.getElementById("search-input");
  if (inp) { inp.value = ""; onSearch(""); }
}
</script>
</body>
</html>
